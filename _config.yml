# Site
title: SAUL'S BLOG
subtitle: Notes on building, thinking, and the web.
description: A personal blog by Saul.
author: Saul
language: en
timezone: ''

# URL
url: http://example.com
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
archive_dir: archives
category_dir: categories
code_dir: downloads/code

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: false
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

# Home
index_generator:
  path: ''
  per_page: 0
  order_by: -date

# Category
default_category: uncategorized

# Date / Time format
date_format: MMMM D, YYYY
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination (disabled — single page lists everything)
per_page: 0
pagination_dir: page

# Theme
theme: anthropic

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment
deploy:
  type: ''
